[build]
  command = "pip install -r requirements.txt && python -c \"import nltk; nltk.download('stopwords'); nltk.download('wordnet'); nltk.download('omw-1.4')\""

[deploy]
  startCommand = "streamlit run app/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true"
  envVars:
    - key: PYTHON_VERSION
      value: 3.11.0
